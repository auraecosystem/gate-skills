# Machine-readable execution contract for the gate-news-intel primary skill.
# Legacy commands verified against `gate-cli v0.5.2`.
# News shortcuts (+brief, +event-explain, +community-scan) ship in gate-cli v0.7.6+.

name: gate-news-intel
version: "2026.6.22-1"
updated: "2026-06-22"
cli_baseline: "gate-cli v0.7.6 (shortcuts opt-in); legacy v0.5.2"
description: >
  Primary news and intelligence skill: briefings, event narratives, exchange
  listings and announcements, UGC and multi-platform social scan (including X),
  sentiment, optional info-backed market or coin context, and market move
  attribution via explain-market-move. Primary domain: news; auxiliary: info
  when the playbook explicitly adds market/coin background. Report has either
  5 fixed sections (legacy) or 6 sections for market_move_explain (see SKILL.md).

slot_registry:
  symbol:       { type: string,       description: "Coin ticker, e.g. BTC, ETH, SOL." }
  time_range:   { type: string,       description: "Global default 24h / 7d / 30d. News shortcuts (+brief, +event-explain, +community-scan) accept ONLY 1h|24h|7d — clamp before shortcut (see shortcut arg_enums). explain-market-move: 30m|1h|2h|4h|24h. Legacy leaves each have their own arg_enums." }
  event_id:     { type: string,       description: "Event id for get-event-detail when the user references one event." }
  topic_query:  { type: string,       description: "Open-topic or market-wide search query." }
  query:        { type: string,       description: "User's original natural-language question, e.g. 'Why did BTC surge?'. Required for market_move_explain." }

playbooks:

  news_brief:
    intent_keywords: ["what happened", "最近发生了什么", "news brief", "headlines", "快讯"]
    required_slots: [symbol]
    optional_slots: [time_range]
    shortcut:
      min_cli_version: "0.7.6"
      id: agg_news_brief
      cmd: gate-cli news +brief
      args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
      arg_enums: { time-range: [1h, 24h, 7d] }
      replaces_command_ids: [search_news, latest_events, social_sentiment]
      fallback_on_error: true
    commands:
      - id: search_news
        cmd: gate-cli news feed search-news
        args: { coin: "{symbol}", limit: 12, sort-by: "importance", time-range: "{time_range|24h}", format: "json" }
        parallel_group: A
      - id: latest_events
        cmd: gate-cli news events get-latest-events
        args: { coin: "{symbol}", time-range: "{time_range|24h}", limit: 20, format: "json" }
        arg_enums: { time-range: [1h, 24h, 7d] }
        parallel_group: A
      - id: social_sentiment
        cmd: gate-cli news feed get-social-sentiment
        args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
        parallel_group: A

  event_explain:
    intent_keywords: ["event timeline", "event detail", "event context", "event background", "what events happened", "事件时间线", "事件详情", "事件上下文", "事件背景", "发生了什么事件", "最近事件", "事件分析", "事件解读"]
    required_slots: [symbol]
    optional_slots: [time_range, event_id]
    shortcut:
      min_cli_version: "0.7.6"
      id: agg_event_explain
      cmd: gate-cli news +event-explain
      args: { coin: "{symbol}", time-range: "{time_range|7d}", format: "json" }
      arg_enums: { time-range: [1h, 24h, 7d] }
      args_when:
        - when: event_id_present
          condition: "event_id slot is set"
          args: { event-id: "{event_id}", coin: "{symbol}", time-range: "{time_range|7d}", format: "json" }
          replaces_command_ids: [latest_events, search_news, event_detail]
      replaces_command_ids: [latest_events, search_news]
      fallback_on_error: true
      notes:
        - "+event-explain uses search-x in `market_interpretation`, NOT get-social-sentiment — keep legacy `social_sentiment` (not in replaces_command_ids)."
        - "When event_id is set, use args_when branch with --event-id; do not run separate legacy event_detail."
        - "Synthesis: map `market_interpretation` → X/community narrative; `source_coverage` → search_news; `event_summary` → event_detail."
    commands:
      - id: latest_events
        cmd: gate-cli news events get-latest-events
        args: { coin: "{symbol}", time-range: "{time_range|7d}", limit: 25, format: "json" }
        parallel_group: A
      - id: search_news
        cmd: gate-cli news feed search-news
        args: { coin: "{symbol}", limit: 15, sort-by: "importance", time-range: "{time_range|7d}", format: "json" }
        parallel_group: A
      - id: social_sentiment
        cmd: gate-cli news feed get-social-sentiment
        args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
        parallel_group: A
      - id: event_detail
        cmd: gate-cli news events get-event-detail
        args: { event-id: "{event_id}", format: "json" }
        parallel_group: B
        optional: true
    notes:
      - "When `event_id` is known and shortcuts_enabled: use shortcut `args_when` with `--event-id` — do NOT also run legacy `event_detail` (already inside +event-explain)."
      - "When `event_id` is known but shortcuts disabled: run legacy `event_detail` only."
      - "When `event_id` is unknown: shortcut or legacy latest_events + search_news."
      - "For price-move attribution queries, route to `market_move_explain` instead."

  market_move_explain:
    cli_baseline: "gate-cli v0.7.2"
    intent_keywords: ["why did", "why crash", "why dump", "why pump", "what caused", "reason for", "行情为什么", "为什么大涨", "为什么大跌", "怎么回事", "这波", "异动", "归因", "market move", "price movement explanation", "why is it pumping", "why is it dumping", "what drove", "是什么原因", "涨跌原因", "价格波动原因"]
    required_slots: [symbol, query]
    optional_slots: [time_range]
    coin_fallback_rules:
      explicit_coin: "use the coin the user explicitly named"
      context_coin: "use the only coin from conversation context"
      broad_market_no_coin: "default to BTC and append notice: 'No coin specified; defaulting to BTC as the broad-market representative asset.'"
      vague_reference: "ask the user which specific coin they mean (e.g. 'this coin', 'that altcoin')"
      event_impact_no_coin: "ask the user which coin to analyze for this event"
      non_crypto_pass_through: "accept traditional finance names (e.g. 美股, A股, S&P 500) as the coin value and pass through to the CLI"
      non_crypto_ambiguous: "ask the user or route to the appropriate domain skill"
    commands:
      - id: explain_market_move
        cmd: gate-cli news events explain-market-move
        args: { query: "{query}", coin: "{symbol}", time-range: "{time_range|2h}", format: "json" }
        arg_enums: { time-range: [30m, 1h, 2h, 4h, 24h] }
        # Optional params (use CLI defaults): --mode auto|event_impact|price_move (default auto); --lang en|zh (default zh). Server normalizes invalid/7d time-range to 2h.
        parallel_group: A
      - id: market_snapshot
        cmd: gate-cli info marketsnapshot get-market-snapshot
        args: { symbol: "{symbol}", scope: "basic", format: "json" }
        parallel_group: A
        optional: true
      - id: orderbook
        cmd: gate-cli info marketdetail get-orderbook
        args: { symbol: "{symbol}", depth: 20, format: "json" }
        parallel_group: A
        optional: true   # requires Gate SDK service; may return public_mcp_not_configured
      - id: technical_analysis
        cmd: gate-cli info markettrend get-technical-analysis
        args: { symbol: "{symbol}", format: "json" }
        parallel_group: B
        optional: true
      - id: coin_info
        cmd: gate-cli info coin get-coin-info
        args: { query: "{symbol}", scope: "basic", format: "json" }
        parallel_group: B
        optional: true
      - id: search_x
        cmd: gate-cli news feed search-x
        args: { query: "{symbol}", coin: "{symbol}", time-range: "{time_range|24h}", limit: 15, format: "json" }
        arg_enums: { time-range: [1h, 24h, 7d] }   # NARROW — clamp away from explain-market-move-only values (2h, 30m, 4h)
        parallel_group: B
        conditional: "symbol != BTC"
        optional: true
      - id: social_sentiment
        cmd: gate-cli news feed get-social-sentiment
        args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
        arg_enums: { time-range: [1h, 24h, 7d] }   # NARROW — clamp away from explain-market-move-only values (2h, 30m, 4h)
        parallel_group: B
        conditional: "symbol != BTC"
        optional: true
    notes:
      - "No +market-move-explain shortcut in v0.7.6; keep explain-market-move multi-step path."
      - "Group A runs first; Group B after. Agent synthesizes final attribution from ALL outputs."

  market_move_explain:
    cli_baseline: "gate-cli v0.7.2"
    intent_keywords: ["why did", "why crash", "why dump", "why pump", "what caused", "reason for", "行情为什么", "为什么大涨", "为什么大跌", "怎么回事", "这波", "异动", "归因", "market move", "price movement explanation", "why is it pumping", "why is it dumping", "what drove", "是什么原因", "涨跌原因", "价格波动原因"]
    required_slots: [symbol, query]
    optional_slots: [time_range]
    coin_fallback_rules:
      explicit_coin: "use the coin the user explicitly named"
      context_coin: "use the only coin from conversation context"
      broad_market_no_coin: "default to BTC and append notice: 'No coin specified; defaulting to BTC as the broad-market representative asset.'"
      vague_reference: "ask the user which specific coin they mean (e.g. 'this coin', 'that altcoin')"
      event_impact_no_coin: "ask the user which coin to analyze for this event"
      non_crypto_pass_through: "accept traditional finance names (e.g. 美股, A股, S&P 500) as the coin value and pass through to the CLI"
      non_crypto_ambiguous: "ask the user or route to the appropriate domain skill"
    commands:
      - id: explain_market_move
        cmd: gate-cli news events explain-market-move
        args: { query: "{query}", coin: "{symbol}", time-range: "{time_range|2h}", format: "json" }
        arg_enums: { time-range: [30m, 1h, 2h, 4h, 24h] }
        parallel_group: A
      - id: market_snapshot
        cmd: gate-cli info marketsnapshot get-market-snapshot
        args: { symbol: "{symbol}", scope: "basic", format: "json" }
        parallel_group: A
      - id: orderbook
        cmd: gate-cli info marketdetail get-orderbook
        args: { symbol: "{symbol}", depth: 20, format: "json" }
        parallel_group: A
      - id: technical_analysis
        cmd: gate-cli info markettrend get-technical-analysis
        args: { symbol: "{symbol}", format: "json" }
        parallel_group: B
      - id: coin_info
        cmd: gate-cli info coin get-coin-info
        args: { query: "{symbol}", scope: "basic", format: "json" }
        parallel_group: B
      - id: search_x
        cmd: gate-cli news feed search-x
        args: { coin: "{symbol}", time-range: "{time_range|24h}", limit: 15, format: "json" }
        parallel_group: B
        conditional: "symbol != BTC"
      - id: social_sentiment
        cmd: gate-cli news feed get-social-sentiment
        args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
        parallel_group: B
        conditional: "symbol != BTC"
    notes:
      - "Group A (core data) runs first: explain-market-move provides Tavily-based news/event evidence with AI summary; market snapshot and orderbook provide live price/volume/liquidity context."
      - "Group B runs after Group A completes: TA, coin fundamentals, and community signals (non-BTC only)."
      - "For BTC, skip search-x and social-sentiment — Tavily already captures macro/geopolitical signals; community adds noise for BTC."
      - "The agent MUST perform its own final attribution synthesis using ALL collected data. Do not treat any single tool output as the authoritative conclusion."
      - "When explain-market-move returns data_status.is_partial=true, surface the degraded-data notice in the report footer."
      - "If any companion command fails (market_snapshot, orderbook, TA, coin_info, community), mark that section as unavailable — do not abort the entire report."
    cli_future_shortcut: "gate-cli news +market-move-explain --coin {symbol} --query {query} --time-range {time_range|2h} --format json"

  exchange_listings:
    intent_keywords: ["listing", "上新", "上币", "announcement", "公告", "delisting", "下架"]
    required_slots: []
    optional_slots: [symbol]
    commands:
      - id: exchange_announcements
        cmd: gate-cli news feed get-exchange-announcements
        args: { limit: 30, format: "json" }
        parallel_group: A
    notes:
      - "When `symbol` is set, add `--coin {symbol}` to the same command if the CLI supports filtering (see `--help`)."

  community_intel:
    intent_keywords: ["community", "社区", "Reddit", "YouTube", "Twitter", "X上", "舆情", "怎么看"]
    required_slots: [symbol]
    optional_slots: [time_range]
    shortcut:
      min_cli_version: "0.7.6"
      id: agg_community_scan
      cmd: gate-cli news +community-scan
      args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
      arg_enums: { time-range: [1h, 24h, 7d] }
      replaces_command_ids: [ugc_scan, search_x, social_sentiment]
      fallback_on_error: true
    commands:
      - id: ugc_scan
        cmd: gate-cli news feed search-ugc
        args: { coin: "{symbol}", time-range: "{time_range|7d}", platform: "all", limit: 25, format: "json" }
        parallel_group: A
      - id: search_x
        cmd: gate-cli news feed search-x
        args: { query: "{symbol}", coin: "{symbol}", time-range: "{time_range|7d}", limit: 25, format: "json" }
        parallel_group: A
      - id: social_sentiment
        cmd: gate-cli news feed get-social-sentiment
        args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
        parallel_group: A

  intel_plus_market:
    intent_keywords: ["news and market", "新闻 和 大盘", "背景", "market context", "全景"]
    required_slots: [symbol]
    optional_slots: [time_range]
    shortcut_block_order: [shortcut, info_shortcut]
    shortcut:
      min_cli_version: "0.7.6"
      id: agg_intel_brief
      cmd: gate-cli news +brief
      args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
      arg_enums: { time-range: [1h, 24h, 7d] }
      replaces_command_ids: [search_news, latest_events, social_sentiment]
      fallback_on_error: true
    info_shortcut:
      min_cli_version: "0.7.6"
      id: agg_intel_coin_overview
      cmd: gate-cli info +coin-overview
      args: { symbol: "{symbol}", format: "json" }
      replaces_command_ids: [coin_info, market_snapshot, technical_analysis]
      fallback_on_error: true
    commands:
      - id: search_news
        cmd: gate-cli news feed search-news
        args: { coin: "{symbol}", limit: 12, sort-by: "importance", time-range: "{time_range|24h}", format: "json" }
        parallel_group: A
      - id: latest_events
        cmd: gate-cli news events get-latest-events
        args: { coin: "{symbol}", time-range: "{time_range|7d}", limit: 20, format: "json" }
        parallel_group: A
      - id: social_sentiment
        cmd: gate-cli news feed get-social-sentiment
        args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
        parallel_group: A
      - id: market_overview
        cmd: gate-cli info marketsnapshot get-market-overview
        args: { format: "json" }
        parallel_group: B
        optional: true
      - id: coin_info
        cmd: gate-cli info coin get-coin-info
        args: { query: "{symbol}", scope: "basic", format: "json" }
        parallel_group: B
        optional: true
      - id: market_snapshot
        cmd: gate-cli info marketsnapshot get-market-snapshot
        args: { symbol: "{symbol}", scope: "basic", format: "json" }
        parallel_group: B
        optional: true
      - id: technical_analysis
        cmd: gate-cli info markettrend get-technical-analysis
        args: { symbol: "{symbol}", format: "json" }
        parallel_group: B
        optional: true
    notes:
      - "Same-playbook block order: news +brief (shortcut) then info +coin-overview (info_shortcut). Not info-before-news unless using extends parent chain."
      - "When shortcuts_enabled: run `shortcut` (news) + `info_shortcut` (coin); accumulate skip_ids union; skip replaced ids. market_overview legacy optional remains if user wants broad market — or add `info +market-overview` manually when no symbol context."

  market_wide_intel:
    intent_keywords: ["what happened in crypto", "币圈最近", "overall news", "macro narrative", "大盘 新闻"]
    required_slots: []
    optional_slots: [topic_query]
    shortcut:
      min_cli_version: "0.7.6"
      id: agg_market_wide_overview
      cmd: gate-cli info +market-overview
      args: { format: "json" }
      replaces_command_ids: [market_overview]
      fallback_on_error: true
      notes:
        - "No coin-rankings boards on shortcut path; use benchmark_snapshots in synthesis (see cli-version-routing.md)."
    commands:
      - id: open_web
        cmd: gate-cli news feed web-search
        args: { query: "{topic_query|cryptocurrency market news last 24 hours}", format: "json" }
        parallel_group: A
      - id: market_overview
        cmd: gate-cli info marketsnapshot get-market-overview
        args: { format: "json" }
        parallel_group: A
        optional: true

failure_policy:
  required_failure: abort_with_error
  optional_failure: mark_section_missing

report_sections:
  - id: headline_summary
    title: "事件/新闻结论摘要"
    source_commands: [agg_news_brief, agg_intel_brief, search_news, latest_events, open_web, exchange_announcements]
  - id: facts_timeline
    title: "关键事实与时间线"
    source_commands: [agg_event_explain, latest_events, event_detail, search_news, agg_news_brief]
  - id: community_views
    title: "社区/UGC/X/Reddit/YouTube 观点"
    source_commands: [agg_community_scan, ugc_scan, search_x, social_sentiment]
  - id: market_or_coin_context
    title: "市场或币种背景（若相关）"
    source_commands: [agg_market_wide_overview, agg_intel_coin_overview, market_overview, coin_info, market_snapshot, technical_analysis]
  - id: follow_up
    title: "结论与需继续跟踪的事项"
    source_commands: [agg_news_brief, search_news, latest_events, social_sentiment]

market_move_report_sections:
  - id: move_summary
    title: "行情异动概述"
    source_commands: [explain_market_move, market_snapshot, technical_analysis]
  - id: primary_drivers
    title: "主要驱动因素"
    source_commands: [explain_market_move]
  - id: supporting_context
    title: "支撑背景"
    source_commands: [explain_market_move, market_snapshot, orderbook]
  - id: technical_signals
    title: "技术信号"
    source_commands: [technical_analysis, coin_info]
  - id: community_perspective
    title: "社区观点"
    source_commands: [search_x, social_sentiment]
  - id: what_to_watch
    title: "关注要点"
    source_commands: [explain_market_move, market_snapshot, technical_analysis]
