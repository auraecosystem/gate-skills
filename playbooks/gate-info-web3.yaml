# Machine-readable execution contract for the gate-info-web3 primary skill.
# Legacy commands verified against `gate-cli v0.5.2`.
# Info shortcuts (+address-tracker, +token-onchain) ship in gate-cli v0.7.6+.

name: gate-info-web3
version: "2026.6.22-1"
updated: "2026-06-22"
cli_baseline: "gate-cli v0.7.6 (shortcuts opt-in); legacy v0.5.2"
description: >
  Umbrella skill for on-chain behavior, token flows, smart-money signals, entity-style
  questions, protocol / platform metrics, reserves, liquidation heatmaps, stablecoins,
  and bridges — executed via gate-cli info (+ optional news for context). Not a DeFi-only
  skill. Report has 6 fixed sections (see SKILL.md).

slot_registry:
  address:         { type: string, description: "Wallet or contract address (chain-dependent)." }
  chain:           { type: string, description: "Chain id: eth, bsc, arbitrum, base, solana, tron, ..." }
  token:           { type: string, description: "Ticker or contract for on-chain token analysis." }
  symbol:          { type: string, description: "Ticker for news / heatmap / reserves (e.g. BTC, ETH, USDC). When `token` is a contract address, set `symbol` from get-coin-info / +token-onchain `coin_context` before news shortcuts." }
  symbols:         { type: string_array, description: "Multiple tickers when comparing flows." }
  platform:        { type: string, description: "Protocol / platform slug (e.g. uniswap, aave)." }
  exchange:        { type: string, description: "CEX id for reserves (e.g. binance, okx)." }
  asset:           { type: string, description: "Asset symbol for reserves or yield (e.g. BTC, USDC)." }
  entity_query:    { type: string, description: "Named entity / desk / fund (e.g. Jump Trading)." }
  time_range:      { type: string, description: "News / tx window. PER-COMMAND ENUM NARROWING — universal super-set is 1h|1d|24h|7d|30d|90d|all. Narrow ones: news feed get-social-sentiment accepts ONLY 1h|24h|7d. news feed search-news accepts 1h|24h|7d|30d. search-ugc accepts 1h|24h|7d|30d|all. onchain get-address-transactions accepts 1h|1d|24h|7d|30d|90d. Check each command's `arg_enums` before substituting." }
  min_value_usd:   { type: number, description: "Large-tx threshold for address tx list." }

playbooks:

  address_tracking:
    intent_keywords: ["track this address", "追踪地址", "这个地址是谁", "what is this wallet doing", "wallet activity"]
    required_slots: [address, chain]
    optional_slots: [min_value_usd, time_range]
    shortcut:
      min_cli_version: "0.7.6"
      id: agg_address_tracker
      cmd: gate-cli info +address-tracker
      args: { address: "{address}", chain: "{chain}", min-value: "{min_value_usd|100000}", format: "json" }
      replaces_command_ids: [address_info, address_transactions]
      fallback_on_error: true
      notes:
        - "trace-fund-flow not yet in shortcut; missing_sections may include fund_flow."
    commands:
      - id: address_info
        cmd: gate-cli info onchain get-address-info
        args: { address: "{address}", chain: "{chain}", scope: "full", format: "json" }
        arg_enums: { scope: [basic, detailed, full, with_counterparties, with_defi, with_pnl], upstream-raw-mode: [full, lite, "off"] }
        parallel_group: A
      - id: address_transactions
        cmd: gate-cli info onchain get-address-transactions
        args: { address: "{address}", chain: "{chain}", time-range: "{time_range|30d}", min-value-usd: "{min_value_usd|100000}", limit: 50, format: "json" }
        arg_enums: { time-range: [1h, 1d, 24h, 7d, 30d, 90d], tx-type: [all, contract_call, token_transfer, transfer], upstream-raw-mode: [full, lite, "off"] }
        parallel_group: A
        optional: true

  token_onchain:
    intent_keywords: ["on-chain", "链上", "筹码", "holder", "smart money", "巨鲸", "token flow"]
    required_slots: [token, chain]
    optional_slots: []
    shortcut:
      min_cli_version: "0.7.6"
      id: agg_token_onchain
      cmd: gate-cli info +token-onchain
      args: { symbol: "{symbol|{token}}", format: "json" }
      args_when:
        - when: contract_address
          condition: "token is contract address (0x…, T…, or other on-chain mint shape)"
          args: { address: "{token}", chain: "{chain}", format: "json" }
      replaces_command_ids: [token_onchain]
      fallback_on_error: true
      notes:
        - "Orchestrator MUST pick args vs args_when by token shape (same contract as token_risk)."
        - "smart_money section may be missing_sections until upstream ships."
    commands:
      - id: token_onchain
        cmd: gate-cli info onchain get-token-onchain
        args: { token: "{token}", chain: "{chain}", scope: "full", format: "json" }
        arg_enums: { scope: [activity, full, holders, smart_money, transfers], upstream-raw-mode: [full, lite, "off"] }
        parallel_group: A

  entity_intel:
    intent_keywords: ["Jump Trading", "entity", "desk", "fund", "机构", "最近在干什么", "who is"]
    required_slots: [entity_query]
    optional_slots: [symbol]
    commands:
      - id: open_web_intel
        cmd: gate-cli news feed web-search
        args: { query: "{entity_query} cryptocurrency on-chain activity", format: "json" }
        parallel_group: A
    notes:
      - "`info onchain get-entity-profile` is not in gate-cli inventory; v1 uses web-search + optional news."

  protocol_platform:
    intent_keywords: ["TVL", "Uniswap", "Aave", "protocol", "协议", "defi overview", "费收", "交易量"]
    required_slots: [platform]
    optional_slots: [asset, symbol]
    notes:
      - "Slot `platform` maps to CLI `--platform-name` (profile/history) or `--project` (yield pools). `get-defi-overview` is ecosystem-wide — no per-protocol filter."
    commands:
      - id: defi_overview
        cmd: gate-cli info platformmetrics get-defi-overview
        args: { category: "all", format: "json" }
        parallel_group: A
        optional: true
      - id: platform_info
        cmd: gate-cli info platformmetrics get-platform-info
        args: { platform-name: "{platform}", format: "json" }
        parallel_group: A
      - id: platform_history
        cmd: gate-cli info platformmetrics get-platform-history
        args: { platform-name: "{platform}", format: "json" }
        parallel_group: A
        optional: true
      - id: yield_pools
        cmd: gate-cli info platformmetrics get-yield-pools
        args: { project: "{platform}", symbol: "{asset|USDC}", format: "json" }
        parallel_group: B
        optional: true

  exchange_reserves:
    intent_keywords: ["exchange reserves", "储备", "proof of reserves", "CEX 余额"]
    required_slots: [exchange, asset]
    optional_slots: []
    commands:
      - id: exchange_reserves
        cmd: gate-cli info platformmetrics get-exchange-reserves
        args: { exchange: "{exchange}", asset: "{asset}", format: "json" }
        parallel_group: A

  liquidation_heatmap:
    intent_keywords: ["liquidation", "爆仓", "heatmap", "清算", "which price"]
    required_slots: [symbol]
    optional_slots: [exchange]
    commands:
      - id: liq_heatmap
        cmd: gate-cli info platformmetrics get-liquidation-heatmap
        args: { symbol: "{symbol}", format: "json" }
        parallel_group: A

  stablecoin_bridge:
    intent_keywords: ["stablecoin", "稳定币", "跨链桥", "bridge ranking", "脱锚"]
    required_slots: []
    optional_slots: []
    commands:
      - id: stablecoin_info
        cmd: gate-cli info platformmetrics get-stablecoin-info
        args: { format: "json" }
        parallel_group: A
      - id: bridge_metrics
        cmd: gate-cli info platformmetrics get-bridge-metrics
        args: { format: "json" }
        parallel_group: A

  token_onchain_social:
    intent_keywords: ["on-chain and news", "链上 和 新闻", "聪明钱 舆情", "地址 最近 新闻"]
    required_slots: [token, chain]
    optional_slots: [time_range, symbol]
    extends: token_onchain
    inherits_shortcuts_from: token_onchain
    additional_shortcut:
      min_cli_version: "0.7.6"
      id: agg_community_scan
      cmd: gate-cli news +community-scan
      args: { coin: "{symbol}", time-range: "{time_range|7d}", format: "json" }
      arg_enums: { time-range: [1h, 24h, 7d] }
      replaces_command_ids: [social_sentiment, ugc_scan]
      post_shortcut_optional_ids: [news_brief]
      fallback_on_error: true
      guards:
        - symbol_present
      notes:
        - "+community-scan only covers UGC + X + sentiment (search-ugc / search-x / get-social-sentiment); it does NOT produce news headlines. news_brief (search-news) therefore runs via post_shortcut_optional_ids so headline coverage is not lost — do NOT add news_brief to replaces_command_ids."
        - "Resolve symbol from parent +token-onchain `coin_context` when token is contract_address before this shortcut."
        - "When symbol still empty: skip shortcut AND post-shortcut news ids; mark community section unavailable (never pass contract token to --coin)."
    additional_commands:
      - id: news_brief
        cmd: gate-cli news feed search-news
        args: { coin: "{symbol}", limit: 10, sort-by: "importance", time-range: "{time_range|7d}", format: "json" }
        arg_enums: { time-range: [1h, 24h, 7d, 30d], sort-by: [time, importance, similarity_score] }
        parallel_group: B
      - id: social_sentiment
        cmd: gate-cli news feed get-social-sentiment
        args: { coin: "{symbol}", time-range: "{time_range|24h}", format: "json" }
        arg_enums: { time-range: [1h, 24h, 7d] }
        parallel_group: B
        optional: true
      - id: ugc_scan
        cmd: gate-cli news feed search-ugc
        args: { coin: "{symbol}", time-range: "7d", platform: "all", limit: 15, format: "json" }
        arg_enums: { time-range: [1h, 24h, 7d, 30d, all], platform: [all, discord, reddit, telegram, youtube], sort-by: [recent, relevance, upvotes], quality-tier: [A, B, all], domain: [ai_agent, all, crypto, defi, finance, macro, web3_dev] }
        parallel_group: B
        optional: true
    notes:
      - "Legacy + shortcut: run parent token_onchain first; set symbol from +token-onchain coin_context when token is contract_address."
      - "Run additional_commands news ids only when symbol_present; never pass contract token to --coin."

failure_policy:
  required_failure: abort_with_error
  optional_failure: mark_section_missing

report_sections:
  - id: identification_summary
    title: "对象识别与结论摘要"
    source_commands: [agg_address_tracker, agg_token_onchain, address_info, token_onchain, open_web_intel, defi_overview, exchange_reserves, liq_heatmap, stablecoin_info, bridge_metrics]
  - id: key_onchain_behavior
    title: "关键链上行为"
    source_commands: [agg_address_tracker, agg_token_onchain, address_info, address_transactions, token_onchain]
  - id: flows_smart_entity
    title: "资金流 / 筹码 / 聪明钱 / 实体画像"
    source_commands: [agg_address_tracker, address_transactions, agg_token_onchain, token_onchain, open_web_intel, news_brief, agg_community_scan]
  - id: protocol_platform_metrics
    title: "协议或平台指标（若相关）"
    source_commands: [defi_overview, platform_info, platform_history, yield_pools]
  - id: community_news_context
    title: "社区或新闻背景（若相关）"
    source_commands: [agg_community_scan, news_brief, social_sentiment, ugc_scan]
  - id: risks_watchpoints
    title: "风险与观察点"
    source_commands: [agg_address_tracker, agg_token_onchain, address_info, token_onchain, liq_heatmap, exchange_reserves]
