# Machine-readable execution contract for the gate-info-risk primary skill.
# Legacy commands verified against `gate-cli v0.5.2`.
# `info +token-risk` shortcut ships in gate-cli v0.7.6+.
# Note: `info compliance check-address-risk` / `+address-risk` are NOT shipped.
# Address-level risk uses `info onchain get-address-info` (no +address-tracker here).

name: gate-info-risk
version: "2026.6.12-5"
updated: "2026-06-12"
cli_baseline: "gate-cli v0.7.6 (shortcuts opt-in); legacy v0.5.2"
description: >
  Unified risk assessment for tokens, addresses, and project-level compliance /
  event risks. Primary CLI domain: info. Auxiliary CLI domain: news.
  Report has 5 fixed sections (see SKILL.md).

slot_registry:
  symbol:            { type: string, description: "Coin ticker if the subject is a listed coin." }
  token:             { type: string, description: "Subject of token_risk. ACCEPTS EITHER a ticker (`PEPE`, `USDT`) OR a contract address (`0xdAC17F...`, SPL mint, TRX mint, ...). The CLI flag `--token` is polymorphic — pass contract addresses through it directly. Do NOT also pass `--address`; the CLI rejects both being set at once (`token 与 address 二选一，不能同时传`). Agent must normalize any user-supplied address string into this single slot." }
  address:           { type: string, description: "Wallet address; required for address_risk only. NOT used by token_risk (address-shaped inputs for token_risk belong in the `token` slot — see above)." }
  chain:             { type: string, description: "Chain id. INPUT normalization: always send the short form on --chain (eth, bsc, polygon, arb, op, base, avax, solana, tron). Long-form user input (ethereum / arbitrum / optimism / avalanche / bnb / matic) MUST be mapped to short form before the call. RESPONSE parsing: `.chain` echo is endpoint-dependent (eth→eth on check-token-security, arb→arbitrum on same endpoint), so parsers MUST accept both alias forms — do NOT assume a fixed shape." }
  time_range:        { type: string, description: "Background/event window. PER-COMMAND ENUM NARROWING — universal super-set is 1h|1d|24h|7d|30d|90d but individual commands narrow further. See each command's `arg_enums` below. Narrow ones: news events get-latest-events accepts ONLY 1h|24h|7d (substitute --start-time/--end-time for longer windows). news feed search-news accepts 1h|24h|7d|30d. onchain get-address-transactions accepts 1h|1d|24h|7d|30d|90d." }
  large_tx_usd:      { type: number, description: "Threshold for flagging large transfers in address_risk." }

playbooks:

  token_risk:
    intent_keywords: ["this token safe", "合约安全", "代币有风险", "honeypot", "蜜罐", "税费"]
    required_slots: [token, chain]
    optional_slots: [symbol]
    shortcut:
      min_cli_version: "0.7.6"
      id: agg_token_risk
      cmd: gate-cli info +token-risk
      args: { symbol: "{symbol|{token}}", format: "json" }
      args_when:
        - when: contract_address
          condition: "token is contract address (0x…, T…, or other on-chain mint shape)"
          args: { address: "{token}", chain: "{chain}", format: "json" }
      replaces_command_ids: [token_security, coin_info_basic]
      post_shortcut_optional_ids: [token_onchain]
      fallback_on_error: true
      notes:
        - "+token-risk aggregates check-token-security + get-coin-info only; NOT get-token-onchain."
        - "Orchestrator MUST pick args vs args_when by token shape before invoking."
        - "After shortcut success, still run `token_onchain` (listed in post_shortcut_optional_ids) for holder/chip context."
        - "Native coins without contract (BTC/ETH) may fail shortcut — fall back to legacy or ask for wrapped token address."
    commands:
      - id: token_security
        cmd: gate-cli info compliance check-token-security
        args: { token: "{token}", chain: "{chain}", scope: "full", format: "json" }
        arg_enums: { scope: [basic, full], lang: [cn, en, ja, kr, tw] }
        parallel_group: A
      - id: coin_info_basic
        cmd: gate-cli info coin get-coin-info
        args: { query: "{symbol|{token}}", chain: "{chain}", scope: "basic", format: "json" }
        arg_enums: { scope: [basic, detailed, full, with_project, with_tokenomics], query-type: [address, auto, gate_symbol, name, project, source_id, symbol] }
        parallel_group: A
        optional: true
      - id: token_onchain
        cmd: gate-cli info onchain get-token-onchain
        args: { token: "{token}", chain: "{chain}", scope: "full", format: "json" }
        arg_enums: { scope: [activity, full, holders, smart_money, transfers], upstream-raw-mode: [full, lite, "off"] }
        parallel_group: A
        optional: true

  address_risk:
    intent_keywords: ["this address safe", "地址风险", "会不会被拉黑", "blacklist", "OFAC"]
    required_slots: [address, chain]
    optional_slots: [large_tx_usd, time_range]
    commands:
      - id: address_info
        cmd: gate-cli info onchain get-address-info
        args: { address: "{address}", chain: "{chain}", scope: "basic", format: "json" }
        arg_enums: { scope: [basic, detailed, full, with_counterparties, with_defi, with_pnl], upstream-raw-mode: [full, lite, "off"] }
        parallel_group: A
      - id: address_transactions
        cmd: gate-cli info onchain get-address-transactions
        args: { address: "{address}", chain: "{chain}", time-range: "{time_range|30d}", min-value-usd: "{large_tx_usd|100000}", limit: 50, format: "json" }
        arg_enums: { time-range: [1h, 1d, 24h, 7d, 30d, 90d], tx-type: [all, contract_call, token_transfer, transfer], upstream-raw-mode: [full, lite, "off"] }
        parallel_group: A
        optional: true
    notes:
      - "Do NOT use `info +address-tracker` here — compliance risk ≠ address tracking."
      - "check-address-risk does not ship; skill MUST mark 'scope limited' when address_info lacks risk labels."

  project_risk:
    intent_keywords: ["合规风险", "项目风险", "最近出事了吗", "security incident", "exploit"]
    required_slots: [symbol]
    optional_slots: [time_range]
    commands:
      - id: project_news
        cmd: gate-cli news feed search-news
        args: { coin: "{symbol}", limit: 10, sort-by: "importance", time-range: "{time_range|7d}", format: "json" }
        arg_enums: { time-range: [1h, 24h, 7d, 30d], sort-by: [time, importance, similarity_score] }
        parallel_group: A
      - id: project_events
        cmd: gate-cli news events get-latest-events
        args: { coin: "{symbol}", time-range: "{time_range|7d}", limit: 20, format: "json" }
        arg_enums: { time-range: [1h, 24h, 7d] }
        parallel_group: A
      - id: project_announcements
        cmd: gate-cli news feed get-exchange-announcements
        args: { coin: "{symbol}", limit: 10, format: "json" }
        arg_enums: { announcement-type: [all, delisting, listing, maintenance] }
        parallel_group: A
        optional: true

failure_policy:
  required_failure: abort_with_error
  optional_failure: mark_scope_limited

verdict_rules:
  - "Verdict uses four tiers: 高风险 / 中风险 / 低风险 / 无法判定 (scope limited)."
  - "Missing data NEVER upgrades the verdict toward 低风险."
  - "If the primary command for the chosen playbook (check-token-security for token_risk, get-address-info for address_risk, search-news for project_risk) is missing, the verdict MUST be '无法判定' with an explicit retry hint."
  - "Every risk item MUST be tagged with one of: TECHNICAL_CONTRACT / ADDRESS_COMPLIANCE / PROJECT_LEVEL."
  - "No buy / sell advice is emitted. Only 'recommend further verification' items."
  - "Path: check-token-security.high_risk_list[?risk_key==<K>].risk_value. Known keys in v0.5.2: is_honeypot, is_high_tax, is_open_source."
  - "Path: +token-risk shortcut maps risk_level / risk_items to same verdict rules as check-token-security."

report_sections:
  - id: verdict
    title: "风险结论"
    ordering: "高 → 中 → 低；必须前置"
    source_commands: [agg_token_risk, token_security, address_info, project_news, project_events]
  - id: core_risk_items
    title: "核心风险项"
    source_commands: [agg_token_risk, token_security, address_info, address_transactions, token_onchain]
  - id: onchain_compliance_context
    title: "链上或合规上下文"
    source_commands: [agg_token_risk, address_info, address_transactions, token_onchain, coin_info_basic]
  - id: event_background
    title: "事件背景（若有）"
    source_commands: [project_news, project_events, project_announcements]
  - id: follow_up
    title: "建议继续核验的事项"
    source_commands: [agg_token_risk, token_security, address_info, project_events]
